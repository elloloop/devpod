name: Web Dashboard CI

on:
  push:
    branches: [main]
    paths: ['platform/web/**']
  pull_request:
    paths: ['platform/web/**']

defaults:
  run:
    working-directory: platform/web

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/web/package-lock.json
      - run: npm ci
      - run: npx next lint
      - run: npx next build
