name: Video Capture CI

on:
  push:
    branches: [main]
    paths: ['platform/actions/video-capture/**']
  pull_request:
    paths: ['platform/actions/video-capture/**']

defaults:
  run:
    working-directory: platform/actions/video-capture

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/actions/video-capture/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/actions/video-capture/package-lock.json
      - run: npm ci
      - run: npm run build
