name: Build train image

on:
  push:
    branches: [main]
    paths: [train/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: train
          push: true
          tags: ghcr.io/${{ github.repository }}:train
          cache-from: type=gha,scope=train
          cache-to: type=gha,mode=max,scope=train
